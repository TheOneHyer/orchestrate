# OSV-Scanner workflow implemented as a standard job rather than calling
# Google's reusable workflows. Google's reusable workflows request
# `actions: read`, which is denied in restricted token contexts such as
# Dependabot pull requests, causing workflow validation failures.
# Running osv-scanner directly avoids that permission requirement and
# works reliably across all PR types including Dependabot.

name: OSV-Scanner

on:
  pull_request:
    branches: [ "main" ]
  merge_group:
    branches: [ "main" ]
  schedule:
    - cron: '37 17 * * 5'
  push:
    branches: [ "main" ]

permissions:
  contents: read

env:
  OSV_SCANNER_VERSION: v2.3.3

jobs:
  osv-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install osv-scanner
        run: |
          curl -sSfL \
            "https://github.com/google/osv-scanner/releases/download/${OSV_SCANNER_VERSION}/osv-scanner_linux_amd64" \
            -o osv-scanner
          echo "777b4bb7ddd10bdcc8a1aa398d37d05e91e866e7586f9cff3fca2f72b8153033  osv-scanner" | sha256sum -c -
          chmod +x osv-scanner
          sudo mv osv-scanner /usr/local/bin/osv-scanner

      - name: Run OSV scan
        run: osv-scanner scan -r ./
