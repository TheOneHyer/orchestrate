name: Typecheck

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  typecheck:
    name: TypeScript — Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.32.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        id: typecheck
        run: pnpm typecheck
        continue-on-error: true

      - name: Write typecheck summary
        if: always()
        run: |
          TYPECHECK_OUTCOME="${{ steps.typecheck.outcome }}"
          {
            if [ "$TYPECHECK_OUTCOME" = "success" ]; then
              echo "## ✅ Typecheck Passed"
              echo ""
              echo "No TypeScript type errors found."
            else
              echo "## ❌ Typecheck Failed"
              echo ""
              echo "One or more TypeScript type errors were found. Review the job logs above for details."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post PR comment on failure
        if: >-
          always() &&
          steps.typecheck.outcome == 'failure' &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT_MARKER: <!-- orchestrate-typecheck-failure -->
        run: |
          set -euo pipefail

          api_path="repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments"
          comment_body=$(cat <<EOF
          ${COMMENT_MARKER}
          ## ❌ Typecheck Failed

          One or more TypeScript type errors were found on this PR. Review the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
          EOF
          )

          existing_comment_id=$(gh api "$api_path" --paginate | jq -r --arg marker "$COMMENT_MARKER" '.[] | select(.user.login == "github-actions[bot]" and ((.body // "") | contains($marker))) | .id' | head -n 1)

          if [ -n "$existing_comment_id" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/$existing_comment_id" \
              --method PATCH \
              -f body="$comment_body" \
              >/dev/null
          else
            gh api "$api_path" \
              --method POST \
              -f body="$comment_body" \
              >/dev/null
          fi

      - name: Fail if typecheck failed
        if: steps.typecheck.outcome == 'failure'
        run: |
          echo "::error::TypeScript type errors were found. Fix all type errors before merging."
          exit 1
