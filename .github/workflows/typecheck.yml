name: Typecheck

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  typecheck:
    name: TypeScript — Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.32.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        id: typecheck
        run: pnpm typecheck
        continue-on-error: true

      - name: Write typecheck summary
        if: always()
        run: |
          TYPECHECK_OUTCOME="${{ steps.typecheck.outcome }}"
          {
            if [ "$TYPECHECK_OUTCOME" = "success" ]; then
              echo "## ✅ Typecheck Passed"
              echo ""
              echo "No TypeScript type errors found."
            else
              echo "## ❌ Typecheck Failed"
              echo ""
              echo "One or more TypeScript type errors were found. Review the job logs above for details."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post PR comment on failure
        if: >-
          always() &&
          steps.typecheck.outcome == 'failure' &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        uses: ./.github/actions/upsert-pr-status-comment
        with:
          gh_token: ${{ github.token }}
          repo: ${{ github.repository }}
          pr_number: ${{ github.event.pull_request.number }}
          marker: <!-- orchestrate-typecheck-failure -->
          title: ❌ Typecheck Failed
          message: One or more TypeScript type errors were found on this PR.
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Fail if typecheck failed
        if: steps.typecheck.outcome == 'failure'
        run: |
          echo "::error::TypeScript type errors were found. Fix all type errors before merging."
          exit 1
