---
name: "Dependabot Auto-Merge"

on:
  pull_request_target:
    branches: ["main"]
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read

concurrency:
  group: dependabot-auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-merge:
    if: >-
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.state == 'open' &&
      !github.event.pull_request.draft
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      checks: read
    env:
      COMMENT_MARKER: '<!-- dependabot-auto-merge -->'
      MANUAL_RESOLUTION_MENTION: '@${{ github.repository_owner }}'
      REQUIRED_CHECKS: '["build", "Vitest \u2014 Tests & Coverage", "osv-scan"]'
      WAIT_INTERVAL_MS: "20000"
      WAIT_TIMEOUT_MS: "1800000"
    steps:
      - name: Evaluate and merge Dependabot PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = process.env.COMMENT_MARKER;
            const mentionTarget = process.env.MANUAL_RESOLUTION_MENTION;
            const requiredChecks = JSON.parse(process.env.REQUIRED_CHECKS);
            const waitIntervalMs = Number(process.env.WAIT_INTERVAL_MS);
            const waitTimeoutMs = Number(process.env.WAIT_TIMEOUT_MS);
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pullNumber = context.payload.pull_request.number;

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            async function getPullRequest() {
              const { data } = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: pullNumber,
              });

              return data;
            }

            async function upsertComment(body) {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: pullNumber,
                per_page: 100,
              });

              const existingComment = comments.find(
                (comment) => comment.user?.login === 'github-actions[bot]' && comment.body?.includes(marker),
              );

              const commentBody = `${marker}\n${body}`;

              if (existingComment) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existingComment.id,
                  body: commentBody,
                });
                return;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pullNumber,
                body: commentBody,
              });
            }

            async function waitForMergeableState() {
              for (let attempt = 0; attempt < 12; attempt += 1) {
                const pullRequest = await getPullRequest();
                if (pullRequest.mergeable_state !== 'unknown') {
                  return pullRequest;
                }

                await sleep(5000);
              }

              return getPullRequest();
            }

            async function getLatestCheckRuns(ref) {
              const { data } = await github.rest.checks.listForRef({
                owner,
                repo,
                ref,
                per_page: 100,
              });

              const latestRuns = new Map();

              for (const run of data.check_runs) {
                const existingRun = latestRuns.get(run.name);
                if (!existingRun || run.id > existingRun.id) {
                  latestRuns.set(run.name, run);
                }
              }

              return latestRuns;
            }

            function summarizeChecks(checkRuns) {
              const failed = [];
              const pending = [];

              for (const requiredCheck of requiredChecks) {
                const run = checkRuns.get(requiredCheck);

                if (!run || run.status !== 'completed') {
                  pending.push(requiredCheck);
                  continue;
                }

                if (run.conclusion !== 'success') {
                  failed.push(`${requiredCheck} (${run.conclusion ?? 'unknown'})`);
                }
              }

              return { failed, pending };
            }

            const initialPullRequest = await waitForMergeableState();

            if (initialPullRequest.state !== 'open' || initialPullRequest.draft) {
              core.notice('Pull request is no longer open and ready for auto-merge.');
              return;
            }

            if (initialPullRequest.mergeable_state === 'behind') {
              core.notice('Dependabot PR is behind main. Requesting a branch update before evaluating checks.');
              try {
                await github.rest.pulls.updateBranch({
                  owner,
                  repo,
                  pull_number: pullNumber,
                  expected_head_sha: initialPullRequest.head.sha,
                });
                return;
              } catch (error) {
                const message = error instanceof Error ? error.message : String(error);
                core.warning(`Failed to update Dependabot PR branch from base: ${message}`);
                await upsertComment([
                  '## Dependabot auto-merge blocked',
                  '',
                  'This pull request is behind the base branch and an automatic branch update from Dependabot failed.',
                  '',
                  `Error from GitHub API: \`${message}\``,
                  '',
                  `${mentionTarget} please update this branch manually (or resolve the reported issue) and re-run the checks.`,
                ].join('\n'));
                core.setFailed('Dependabot PR could not be updated with the latest base branch. See the PR comment for details.');
                return;
              }
            }

            if (initialPullRequest.mergeable === false && initialPullRequest.mergeable_state === 'dirty') {
              await upsertComment([
                '## Dependabot auto-merge blocked',
                '',
                'This pull request could not be auto-merged because it has merge conflicts with `main`.',
                '',
                `${mentionTarget} please resolve the conflicts manually.`,
              ].join('\n'));
              core.setFailed('Dependabot PR has merge conflicts.');
              return;
            }

            const startedAt = Date.now();

            while (Date.now() - startedAt < waitTimeoutMs) {
              const pullRequest = await waitForMergeableState();

              if (pullRequest.state !== 'open') {
                core.notice('Pull request is no longer open. Skipping auto-merge.');
                return;
              }

              if (pullRequest.mergeable_state === 'behind') {
                core.notice('A new commit left the PR behind main. Requesting another branch update.');
                await github.rest.pulls.updateBranch({
                  owner,
                  repo,
                  pull_number: pullNumber,
                  expected_head_sha: pullRequest.head.sha,
                });
                return;
              }

              if (pullRequest.mergeable === false && pullRequest.mergeable_state === 'dirty') {
                await upsertComment([
                  '## Dependabot auto-merge blocked',
                  '',
                  'This pull request could not be auto-merged because it has merge conflicts with `main`.',
                  '',
                  `${mentionTarget} please resolve the conflicts manually.`,
                ].join('\n'));
                core.setFailed('Dependabot PR has merge conflicts.');
                return;
              }

              const checkRuns = await getLatestCheckRuns(pullRequest.head.sha);
              const { failed, pending } = summarizeChecks(checkRuns);

              if (failed.length > 0) {
                await upsertComment([
                  '## Dependabot auto-merge skipped',
                  '',
                  'One or more required checks failed on the latest PR commit:',
                  '',
                  ...failed.map((check) => `- ${check}`),
                  '',
                  `${mentionTarget} please review this PR and resolve it manually.`,
                ].join('\n'));
                core.setFailed(`Required checks failed: ${failed.join(', ')}`);
                return;
              }

              if (pending.length === 0) {
                try {
                  const mergeResponse = await github.rest.pulls.merge({
                    owner,
                    repo,
                    pull_number: pullNumber,
                    merge_method: 'squash',
                    sha: pullRequest.head.sha,
                  });

                  if (!mergeResponse.data.merged) {
                    throw new Error(mergeResponse.data.message || 'GitHub did not merge the pull request.');
                  }

                  await upsertComment([
                    '## Dependabot auto-merged',
                    '',
                    'This pull request was squash-merged automatically after all required checks passed.',
                  ].join('\n'));
                  return;
                } catch (error) {
                  await upsertComment([
                    '## Dependabot auto-merge skipped',
                    '',
                    'All tracked checks passed, but GitHub rejected the squash merge request.',
                    '',
                    `${mentionTarget} please review the PR manually.`,
                    '',
                    `Merge error: ${error.message}`,
                  ].join('\n'));
                  throw error;
                }
              }

              await sleep(waitIntervalMs);
            }

            await upsertComment([
              '## Dependabot auto-merge timed out',
              '',
              'The workflow stopped waiting for required checks before a merge decision could be made.',
              '',
              `${mentionTarget} please review the latest check results manually.`,
            ].join('\n'));
            core.setFailed('Timed out waiting for required checks to complete.');
