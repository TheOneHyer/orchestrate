name: Lint

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: ESLint — Lint Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.32.1

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-node-${{ hashFiles('.node-version') }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ hashFiles('.node-version') }}-pnpm-store-
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        id: lint
        run: pnpm lint
        continue-on-error: true

      - name: Write lint summary
        if: always()
        run: |
          LINT_OUTCOME="${{ steps.lint.outcome }}"
          {
            if [ "$LINT_OUTCOME" = "success" ]; then
              echo "## ✅ Lint Passed"
              echo ""
              echo "No ESLint errors or warnings found."
            else
              echo "## ❌ Lint Failed"
              echo ""
              echo "One or more ESLint errors or warnings were found. Review the job logs above for details."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post PR comment on failure
        if: >-
          always() &&
          steps.lint.outcome == 'failure' &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MARKER="<!-- lint-status-comment -->"

          BODY=$(cat <<EOF
          ## ❌ Lint Failed

          One or more ESLint errors or warnings were found on this PR. Review the [workflow run]($RUN_URL) for details.

          $MARKER
          EOF
          )

          # Try to find an existing bot comment for lint status using the hidden marker.
          COMMENT_ID="$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --paginate \
            --jq ".[] | select(.user.type == \"Bot\" and (.body | contains(\"$MARKER\"))) | .id" | head -n 1)"

          if [ -z "$COMMENT_ID" ]; then
            # No existing comment found; create a new one.
            gh pr comment "$PR_NUMBER" \
              --body "$BODY" \
              --repo "$REPO"
          else
            # Existing comment found; update it instead of creating a new one.
            gh api "repos/$REPO/issues/comments/$COMMENT_ID" \
              -X PATCH \
              -f "body=$BODY"
          fi
      - name: Fail if lint failed
        if: steps.lint.outcome == 'failure'
        run: |
          echo "::error::ESLint found errors or warnings. Fix all lint issues before merging."
          exit 1
